<svg viewBox="50 90 720 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Top bar gradients (brightest) -->
    <linearGradient id="topG" x1="0" y1="0" x2="1" y2="0.6">
      <stop offset="0%" stop-color="#FFF8B0"/>
      <stop offset="30%" stop-color="#F5DE6A"/>
      <stop offset="70%" stop-color="#E8C44A"/>
      <stop offset="100%" stop-color="#D4A833"/>
    </linearGradient>
    <linearGradient id="frontG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EABD42"/>
      <stop offset="50%" stop-color="#D4A83A"/>
      <stop offset="100%" stop-color="#B8912A"/>
    </linearGradient>
    <linearGradient id="sideG" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C49A30"/>
      <stop offset="100%" stop-color="#7A5F14"/>
    </linearGradient>
    <!-- Bar 2 gradients -->
    <linearGradient id="topG2" x1="0" y1="0" x2="1" y2="0.6">
      <stop offset="0%" stop-color="#F5E080"/>
      <stop offset="40%" stop-color="#E0C44E"/>
      <stop offset="100%" stop-color="#C49A30"/>
    </linearGradient>
    <linearGradient id="frontG2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D8AE38"/>
      <stop offset="100%" stop-color="#A07D20"/>
    </linearGradient>
    <linearGradient id="sideG2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#B08A25"/>
      <stop offset="100%" stop-color="#6B5010"/>
    </linearGradient>
    <!-- Bar 3 gradients -->
    <linearGradient id="topG3" x1="0" y1="0" x2="1" y2="0.6">
      <stop offset="0%" stop-color="#E8CC58"/>
      <stop offset="100%" stop-color="#B08A25"/>
    </linearGradient>
    <linearGradient id="frontG3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C49A30"/>
      <stop offset="100%" stop-color="#8C6B18"/>
    </linearGradient>
    <linearGradient id="sideG3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#9E7E22"/>
      <stop offset="100%" stop-color="#5C4410"/>
    </linearGradient>
    <!-- Bar 4 gradients (darkest) -->
    <linearGradient id="topG4" x1="0" y1="0" x2="1" y2="0.6">
      <stop offset="0%" stop-color="#D4AA40"/>
      <stop offset="100%" stop-color="#9E7E22"/>
    </linearGradient>
    <linearGradient id="frontG4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#B08A25"/>
      <stop offset="100%" stop-color="#7A5F14"/>
    </linearGradient>
    <linearGradient id="sideG4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8C6B18"/>
      <stop offset="100%" stop-color="#4A3508"/>
    </linearGradient>
    <!-- Specular highlight -->
    <linearGradient id="specular" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFFDE0" stop-opacity="0"/>
      <stop offset="35%" stop-color="#FFFDE0" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0.6"/>
      <stop offset="65%" stop-color="#FFFDE0" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#FFFDE0" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Bar 4 (bottom, darkest) -->
  <g transform="translate(170, 248)">
    <path d="M-66,0 L66,0 L66,30 L-66,30 Z" fill="url(#frontG4)"/>
    <path d="M-66,0 L-52,-18 L52,-18 L66,0 Z" fill="url(#topG4)"/>
    <path d="M66,0 L52,-18 L52,12 L66,30 Z" fill="url(#sideG4)"/>
    <!-- Edge highlight -->
    <line x1="-66" y1="0" x2="66" y2="0" stroke="#D4AA40" stroke-width="0.8" opacity="0.5"/>
  </g>

  <!-- Bar 3 -->
  <g transform="translate(170, 208)">
    <path d="M-66,0 L66,0 L66,30 L-66,30 Z" fill="url(#frontG3)"/>
    <path d="M-66,0 L-52,-18 L52,-18 L66,0 Z" fill="url(#topG3)"/>
    <path d="M66,0 L52,-18 L52,12 L66,30 Z" fill="url(#sideG3)"/>
    <line x1="-66" y1="0" x2="66" y2="0" stroke="#E8C44A" stroke-width="0.8" opacity="0.5"/>
    <!-- Specular stripe on front -->
    <path d="M-20,2 L20,2 L20,28 L-20,28 Z" fill="url(#specular)" opacity="0.15"/>
  </g>

  <!-- Bar 2 -->
  <g transform="translate(170, 168)">
    <path d="M-66,0 L66,0 L66,30 L-66,30 Z" fill="url(#frontG2)"/>
    <path d="M-66,0 L-52,-18 L52,-18 L66,0 Z" fill="url(#topG2)"/>
    <path d="M66,0 L52,-18 L52,12 L66,30 Z" fill="url(#sideG2)"/>
    <line x1="-66" y1="0" x2="66" y2="0" stroke="#F0D45A" stroke-width="0.8" opacity="0.6"/>
    <path d="M-15,2 L25,2 L25,28 L-15,28 Z" fill="url(#specular)" opacity="0.2"/>
  </g>

  <!-- Bar 1 (top, brightest, hero) -->
  <g transform="translate(170, 128)">
    <path d="M-66,0 L66,0 L66,30 L-66,30 Z" fill="url(#frontG)"/>
    <path d="M-66,0 L-52,-18 L52,-18 L66,0 Z" fill="url(#topG)"/>
    <path d="M66,0 L52,-18 L52,12 L66,30 Z" fill="url(#sideG)"/>
    <!-- Strong top edge catch light -->
    <line x1="-66" y1="0" x2="66" y2="0" stroke="#FFF8B0" stroke-width="1.2" opacity="0.7"/>
    <!-- Specular on top face -->
    <path d="M-40,-15 L-20,-15 L-14,-3 L-46,-3 Z" fill="#FFFDE0" opacity="0.2"/>
    <!-- Specular stripe on front face -->
    <path d="M-10,2 L30,2 L30,28 L-10,28 Z" fill="url(#specular)" opacity="0.25"/>
    <!-- Bullion stamp -->
    <rect x="-20" y="-14" width="40" height="11" rx="1.5" fill="none" stroke="#C49A30" stroke-width="0.7" opacity="0.5"/>
    <!-- Left edge catch -->
    <line x1="-66" y1="0" x2="-52" y2="-18" stroke="#FFF2A0" stroke-width="0.6" opacity="0.4"/>
  </g>

  <!-- AURUM wordmark — sized to match bars height -->
  <text x="260" y="240" font-family="'Helvetica Neue', 'Arial', sans-serif" font-size="105" font-weight="500" letter-spacing="18" fill="#D4A843">AURUM</text>

</svg>
